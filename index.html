<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity Tools</title>
    <link rel="stylesheet" href="style.css">
</head>


<body>

    <span id="credit">Made By Arko</span>

    <div class="menu">
        <input type="checkbox" id="checkbox" onchange="toggleMenu()">
        <label for="checkbox" class="toggle">

            <div class="bars" id="bar1"></div>
            <div class="bars" id="bar2"></div>
            <div class="bars" id="bar3"></div>
        </label>
    </div>

    <label for="checkbox" class="blank_exit"></label>


    <div class="drawer" id="drawer">

        <h3>Settings</h3>

        <button onclick="changeAPI()">Change API Key</button>

        <button onclick="deleteAPI()">Delete API Key</button>

        <button>About App</button>

        <button>Contact Developer</button>



    </div>


    <!-- LOGIN -->

    <div class="login" id="login">

        <div class="loginbox">
            <button id="cross" onclick="closelogin()">×</button>

            <h2>Enter API Key</h2>

            <input id="apikeyinput" placeholder="OpenRouter API Key">

            <button id="continueBtn">Continue</button>
            <p>
                Don't have an API key? <a href="#">How to get an API key?</a>
            </p>
        </div>

    </div>

    


    <div class="app" id="app">

        <div id="create" class="section active">

            <h2>Create Tool</h2>

            <input id="name" placeholder="Tool Name">

            <textarea id="prompt" placeholder="Describe the tool..."></textarea>

            <button onclick="generate()">Generate Tool</button>

        </div>



        <div id="tools" class="section">

            <h2>Your Tools</h2>

            <div id="toolList"></div>

        </div>

    </div>



    <!-- NAVBAR -->

    <div class="navbar">
        <button class="navbtn active" onclick="tab('create')">Create New</button>
        <button class="navbtn" onclick="tab('tools')">Your Tools</button>
    </div>



    <!-- OVERLAY -->

    <div class="overlay" id="overlay">

        <div class="box">

            <!-- From Uiverse.io by dexter-st -->
            <div class="loader-wrapper" id="spin">
                <span class="loader-letter">G</span>
                <span class="loader-letter">e</span>
                <span class="loader-letter">n</span>
                <span class="loader-letter">e</span>
                <span class="loader-letter">r</span>
                <span class="loader-letter">a</span>
                <span class="loader-letter">t</span>
                <span class="loader-letter">i</span>
                <span class="loader-letter">n</span>
                <span class="loader-letter">g</span>

                <div class="loader"></div>
            </div>


            <p id="msg"></p>

        </div>

    </div>



    <script src="script.js"></script>

</body>

</html>
